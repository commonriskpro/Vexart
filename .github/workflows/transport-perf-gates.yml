name: transport-perf-gates

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/engine/src/ffi/**"
      - "packages/engine/src/loop/**"
      - "packages/engine/src/output/**"
      - "scripts/frame-breakdown.tsx"
      - "scripts/frame-breakdown-gate.ts"
      - "package.json"

jobs:
  transport-perf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native canvas deps
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build native library
        run: cargo build --release

      - name: SHM transport perf gate
        run: bun run perf:transport:shm

      - name: File transport perf gate
        run: bun run perf:transport:file
