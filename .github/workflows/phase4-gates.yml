name: phase4-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-and-visual-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native canvas deps
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build native library
        run: cargo build --release

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: API snapshot gate
        run: |
          bun run api:update
          git diff --exit-code -- packages/engine/etc/engine.api.md packages/primitives/etc/primitives.api.md packages/headless/etc/headless.api.md packages/styled/etc/styled.api.md

      - name: Visual regression gate
        run: bun run test:visual
