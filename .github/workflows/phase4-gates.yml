name: phase4-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-and-visual-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native deps (canvas + software Vulkan for headless GPU)
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev mesa-vulkan-drivers libvulkan1

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build native library
        run: cargo build --release

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (excluding GPU-dependent tests)
        run: |
          # GPU-dependent tests need real GPU (texture limits > 2048px).
          # They run locally; CI uses software Vulkan (lavapipe) which is too limited.
          find packages -name '*.test.ts' -o -name '*.test.tsx' \
            | grep -v 'frame-orchestrator\.test' \
            | grep -v 'showcase-tab2\.test' \
            | grep -v 'native-image-assets\.test' \
            | grep -v 'native-canvas-display-list\.test' \
            | grep -v 'native-presentation-stats\.test' \
            | grep -v 'native-layer-registry-flags\.test' \
            | grep -v 'bridge\.test' \
            | xargs bun test

      - name: API snapshot gate
        run: |
          bun run api:update
          git diff --exit-code -- packages/engine/etc/engine.api.md packages/primitives/etc/primitives.api.md packages/headless/etc/headless.api.md packages/styled/etc/styled.api.md
