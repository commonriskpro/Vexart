name: build-native

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform-tag: darwin-arm64
            lib-name: libvexart.dylib
          - os: macos-13
            target: x86_64-apple-darwin
            platform-tag: darwin-x64
            lib-name: libvexart.dylib
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform-tag: linux-x64
            lib-name: libvexart.so
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform-tag: linux-arm64
            lib-name: libvexart.so

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build libvexart (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/${{ matrix.lib-name }} artifact/
          echo '{"name":"@vxrt/${{ matrix.platform-tag }}","version":"0.0.0","os":["${{ matrix.os == 'macos-14' && 'darwin' || matrix.os == 'macos-13' && 'darwin' || 'linux' }}"],"cpu":["${{ contains(matrix.platform-tag, 'arm64') && 'arm64' || 'x64' }}"],"files":["${{ matrix.lib-name }}"],"license":"SEE LICENSE IN LICENSE.md"}' > artifact/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform-tag }}
          path: artifact/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/native-darwin-arm64/libvexart.dylib
            artifacts/native-darwin-x64/libvexart.dylib
            artifacts/native-linux-x64/libvexart.so
            artifacts/native-linux-arm64/libvexart.so
          generate_release_notes: true
